<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Smart Resident - Politeknik Ungku Omar</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <style>
            html, body { height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #1e252d;}

            /* --- HEADER SECTION --- */
            header {
                position: relative; height: 100px; width: 100%; overflow: hidden;
                display: flex; align-items: center; justify-content: center; color: white;
                box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 1000; background: #2c3e50;
            }

            #header-video {
                position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
                width: auto; height: auto; transform: translate(-50%, -50%);
                z-index: -1; filter: brightness(30%); object-fit: cover;
            }

            .header-content { display: flex; align-items: center; width: 95%; justify-content: space-between; z-index: 1; }
            
            .logo-politeknik { 
                height: 70px; width: auto; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.8));
            }

            .header-title h1 { 
                margin: 0; font-size: 22px; text-transform: uppercase; 
                text-shadow: 2px 2px 4px rgba(0,0,0,0.8); text-align: right; letter-spacing: 1px;
            }

            /* --- LAYOUT UTAMA --- */
            .main-wrapper { display: flex; flex: 1; position: relative; overflow: hidden; }

            #map { flex: 1; background: #f0f0f0; }

            .sidebar {
                width: 320px; background-color: #1e252d; color: #ecf0f1;
                display: flex; flex-direction: column; padding: 20px;
                box-shadow: -4px 0 15px rgba(0,0,0,0.5); z-index: 999; overflow-y: auto;
            }

            .section-title { font-size: 15px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #34495e; padding-bottom: 10px;}
            .section-title i { margin-right: 10px; color: #3498db; }

            .control-group { margin-bottom: 20px; }
            input[type="text"] {
                width: 100%; padding: 12px; background: #2c3e50; border: 1px solid #4a6278;
                color: white; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; font-size: 14px;
                transition: border-color 0.3s ease;
            }
            input[type="text"]:focus { outline: none; border-color: #3498db; }

            .btn {
                width: 100%; padding: 12px; border: none; border-radius: 6px; color: white;
                font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 12px;
                text-transform: uppercase; display: flex; align-items: center; justify-content: center;
                transition: transform 0.1s, opacity 0.3s;
            }
            .btn:hover { opacity: 0.9; transform: scale(0.98); }
            .btn-green { background-color: #27ae60; }
            .btn-red { background-color: #c0392b; }
            .btn-blue { background-color: #2980b9; }
            .btn i { margin-right: 8px; font-size: 14px;}

            .info-label { font-size: 11px; color: #95a5a6; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; }
            .info-box {
                background: #161c23; border-radius: 6px; padding: 12px; margin-top: 5px;
                border-left: 4px solid #27ae60; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            }
            .info-value { font-size: 16px; font-weight: bold; color: #2ecc71; word-wrap: break-word; }

            #loading-overlay {
                display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); 
                z-index: 9999; color:white; text-align:center; padding-top:20%; font-size: 20px; font-weight: bold;
                backdrop-filter: blur(5px);
            }
            
            /* Custom Scrollbar for Sidebar */
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: #1e252d; }
            ::-webkit-scrollbar-thumb { background: #34495e; border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: #2c3e50; }
        </style>
    </head>
    <body>
        
        <header>
            <video autoplay muted loop id="header-video">
                <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
            </video>
            <div class="header-content">
                <img src="Poli_Logo1-1024x599.png" alt="Logo PUO" class="logo-politeknik" onerror="this.style.display='none'">
                
                <div class="header-title">
                    <h1>Sistem Peta Lot Tanah<br><span style="font-size: 14px; color: #bdc3c7;">Taman Saujana Putra</span></h1>
                </div>
            </div>
        </header>

        <div class="main-wrapper">
            <div id="map"></div>

            <div class="sidebar">
                <div class="section-title"><i class="fas fa-search-location"></i> Carian Lot</div>
                
                <div class="control-group">
                    <input type="text" id="inputLot" placeholder="Masukkan No Lot...">
                    <button class="btn btn-green" onclick="cariLot()"><i class="fas fa-search"></i> Cari Lot</button>
                    <button class="btn btn-red" onclick="resetPeta()"><i class="fas fa-undo"></i> Reset Peta</button>
                    <button class="btn btn-blue" onclick="cetakPDF()"><i class="fas fa-file-pdf"></i> Cetak Laporan (PDF)</button>
                </div>

                <div class="section-title" style="margin-top: 10px;"><i class="fas fa-info-circle"></i> Maklumat Lot</div>

                <div class="info-label">Jumlah Keseluruhan Lot</div>
                <div class="info-box"><div class="info-value" id="dispTotal"><i class="fas fa-spinner fa-spin"></i></div></div>

                <div class="info-label">No Lot Dipilih</div>
                <div class="info-box" style="border-left-color: #f1c40f;"><div class="info-value" id="dispLot" style="color: #f1c40f;">-</div></div>

                <div class="info-label">Keluasan Lot</div>
                <div class="info-box"><div class="info-value" id="dispLuas">-</div></div>

                <div class="info-label">Nama Pemilik</div>
                <div class="info-box" style="border-left-color: #3498db;"><div class="info-value" id="dispPemilik" style="color: #3498db;">-</div></div>
            </div>
        </div>

        <div id="loading-overlay"><i class="fas fa-spinner fa-spin"></i> Menjana Laporan PDF HD... Sila Tunggu</div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        
        <script src="data/lotfinalreal_5.js" onerror="alert('Ralat Kritis: Fail data/lotfinalreal_5.js tidak dijumpai! Pastikan nama fail di dalam folder data adalah betul.')"></script>

        <script>
            // 1. Inisialisasi Peta
            var map = L.map('map', { 
                zoomControl: true, 
                maxZoom: 22 
            }).setView([2.10375, 102.52125], 18); 

            // Layer Google Satellite
            var layer_GoogleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
                maxZoom: 22, 
                maxNativeZoom: 20,
                attribution: 'Google Satellite'
            }).addTo(map);

            var highlightLayer;
            window.selectedLotData = null;

            // Fungsi kemaskini Sidebar (DIBETULKAN PADANAN NAMA DATA)
            function updateSidebar(props) {
                if (props) {
                    document.getElementById('dispLot').innerText = props['NO_LOT'] || '-';
                    var luas = props['AREA'] || '0';
                    document.getElementById('dispLuas').innerText = luas + " m²";
                    document.getElementById('dispPemilik').innerText = props['tsp — pe'] || "- Tiada Data -";
                } else {
                    document.getElementById('dispLot').innerText = "-";
                    document.getElementById('dispLuas').innerText = "-";
                    document.getElementById('dispPemilik').innerText = "-";
                }
            }

            // Fungsi Highlight Lot bila di klik
            function highlightFeature(e) {
                if (highlightLayer) { 
                    layer_lotfinalreal_5.resetStyle(highlightLayer); 
                }
                highlightLayer = e.target;
                highlightLayer.setStyle({ 
                    weight: 4, 
                    color: '#ffeb3b', // Kuning terang
                    fillOpacity: 0.6,
                    fillColor: '#ffeb3b' 
                });
                
                if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                    highlightLayer.bringToFront();
                }

                window.selectedLotData = highlightLayer.feature.properties;
                updateSidebar(window.selectedLotData);
            }

            // Cek jika layer wujud sebelum panggil
            if (typeof json_lotfinalreal_5 !== 'undefined') {
                
                // Papar jumlah lot
                document.getElementById('dispTotal').innerText = json_lotfinalreal_5.features.length + " Lot";

                // Masukkan data ke dalam peta
                var layer_lotfinalreal_5 = new L.geoJson(json_lotfinalreal_5, {
                    onEachFeature: function(feature, layer) {
                        
                        // Letak Popup pada peta (DIBETULKAN PADANAN NAMA DATA)
                        var popContent = "<b>No Lot:</b> " + (feature.properties['NO_LOT'] || "-") + "<br><b>Keluasan:</b> " + (feature.properties['AREA'] || "-") + " m²";
                        layer.bindPopup(popContent);

                        layer.on({
                            mouseover: function(e) {
                                var l = e.target;
                                if(l !== highlightLayer) {
                                    l.setStyle({ fillOpacity: 0.5, weight: 2, color: '#ffffff' });
                                }
                            },
                            mouseout: function(e) {
                                var l = e.target;
                                if(l !== highlightLayer) {
                                    layer_lotfinalreal_5.resetStyle(l);
                                }
                            },
                            click: function(e) {
                                highlightFeature(e);
                            }
                        });
                    },
                    style: { 
                        color: '#ffffff', 
                        weight: 1, 
                        fillColor: '#3498db',
                        fillOpacity: 0.35 
                    }
                }).addTo(map);

                // Auto fokus peta ke kawasan lot
                if (json_lotfinalreal_5.features.length > 0) {
                    map.fitBounds(layer_lotfinalreal_5.getBounds());
                }

            } else {
                document.getElementById('dispTotal').innerText = "Ralat Data";
            }

            // Fungsi Cari Lot (DIBETULKAN UNTUK CARI 'NO_LOT')
            function cariLot() {
                var val = document.getElementById('inputLot').value.trim().toLowerCase();
                if(!val) {
                    alert("Sila masukkan No Lot terlebih dahulu.");
                    return;
                }

                if(typeof layer_lotfinalreal_5 === 'undefined') {
                    alert("Ralat: Data peta tidak dimuatkan dengan betul.");
                    return;
                }

                var found = false;
                layer_lotfinalreal_5.eachLayer(function(layer) {
                    // Ambil data NO_LOT yang tepat dari GeoJSON
                    var lotData = layer.feature.properties['NO_LOT'];
                    
                    if (lotData && lotData.toString().toLowerCase() === val) {
                        map.fitBounds(layer.getBounds(), { maxZoom: 20 });
                        highlightFeature({target: layer});
                        layer.openPopup();
                        found = true;
                    }
                });
                
                if (!found) {
                    alert("No Lot '" + val + "' tidak dijumpai dalam pangkalan data!");
                }
            }

            // Fungsi Reset
            function resetPeta() {
                document.getElementById('inputLot').value = "";
                if(typeof layer_lotfinalreal_5 !== 'undefined') {
                    map.fitBounds(layer_lotfinalreal_5.getBounds());
                }
                if (highlightLayer) {
                    layer_lotfinalreal_5.resetStyle(highlightLayer);
                    highlightLayer.closePopup();
                }
                window.selectedLotData = null;
                updateSidebar(null);
            }

            // --- FUNGSI CETAK PDF (DIBETULKAN PADANAN NAMA DATA) ---
            async function cetakPDF() {
                if (!window.selectedLotData) { 
                    alert("Sila klik / cari satu lot di atas peta terlebih dahulu sebelum mencetak laporan!"); 
                    return; 
                }
                
                document.getElementById('loading-overlay').style.display = 'block';

                try {
                    await new Promise(r => setTimeout(r, 100)); 

                    const mapElement = document.getElementById('map');
                    const mapCanvas = await html2canvas(mapElement, {
                        useCORS: true,
                        scale: 2, 
                        logging: false
                    });

                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('l', 'mm', 'a4'); 

                    // --- DESIGN HEADER ---
                    doc.setFillColor(44, 62, 80); 
                    doc.rect(0, 0, 297, 40, 'F'); 
                    
                    doc.setTextColor(255, 255, 255);
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(24);
                    doc.text("LAPORAN MAKLUMAT LOT TANAH", 148.5, 18, { align: 'center' });
                    
                    doc.setFontSize(11);
                    doc.setFont("helvetica", "italic");
                    doc.text("Taman Saujana Putra | Sistem Peta Pintar", 148.5, 28, { align: 'center' });
                    
                    const tarikh = new Date().toLocaleString('ms-MY');
                    doc.setFontSize(9);
                    doc.setFont("helvetica", "normal");
                    doc.text("Tarikh Cetakan: " + tarikh, 20, 35);

                    // --- DATA LOT (BAHAGIAN KIRI) ---
                    let startY = 60;
                    const leftX = 20;

                    const drawField = (label, value) => {
                        doc.setFontSize(10);
                        doc.setFont("helvetica", "bold");
                        doc.setTextColor(100, 100, 100);
                        doc.text(label, leftX, startY);
                        
                        doc.setFontSize(14);
                        doc.setFont("helvetica", "bold");
                        doc.setTextColor(40, 40, 40);
                        doc.text(value ? value.toString() : "-", leftX, startY + 8);
                        
                        doc.setDrawColor(200, 200, 200);
                        doc.setLineWidth(0.5);
                        doc.line(leftX, startY + 12, 95, startY + 12);
                        startY += 22;
                    };

                    drawField("NOMBOR LOT", window.selectedLotData['NO_LOT']);
                    drawField("NAMA PEMILIK", window.selectedLotData['tsp — pe'] || "TIADA MAKLUMAT REKOD");
                    drawField("LUAS KAWASAN", (window.selectedLotData['AREA'] || "0") + " Meter Persegi");
                    drawField("KEGUNAAN TANAH", window.selectedLotData['KEGUNAAN'] || "BANGUNAN (KEDIAMAN)");
                    drawField("STATUS DATA", "SAH / AKTIF");

                    // --- GAMBAR PETA (BAHAGIAN KANAN) ---
                    const imgWidth = 175;
                    const imgHeight = 125;
                    
                    doc.setDrawColor(44, 62, 80);
                    doc.setLineWidth(1.5);
                    doc.rect(105, 55, imgWidth, imgHeight); 
                    
                    doc.addImage(mapCanvas.toDataURL('image/png'), 'PNG', 105, 55, imgWidth, imgHeight);

                    // Footer
                    doc.setFontSize(9);
                    doc.setTextColor(150, 150, 150);
                    doc.text("Dokumen ini dijana secara automatik oleh sistem dan tidak memerlukan tandatangan fizikal.", 148.5, 195, { align: 'center' });

                    // Simpan Fail
                    const namaFail = "Laporan_Lot_" + (window.selectedLotData['NO_LOT'] || "Baru") + ".pdf";
                    doc.save(namaFail);
                    
                } catch (error) {
                    alert("Ralat semasa menjana PDF: " + error.message);
                    console.error(error);
                } finally {
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            }
        </script>
    </body>
</html>
