<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TAMAN SAUJANA PUTRA</title>

    <link rel="stylesheet" href="css/leaflet.css">

    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; font-family: Arial, sans-serif; overflow: hidden; }

        /* ================= HEADER ================= */
        #header { position: relative; width: 100%; height: 110px; overflow: hidden; display: flex; align-items: center; padding: 0 40px; }
        #header video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; z-index: -2; }
        #header::after { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5); top: 0; left: 0; }
        #header img { height: 80px; margin-right: 20px; z-index: 2; }
        #header h1 { color: white; font-size: 32px; font-weight: bold; margin: 0; z-index: 2; }

        /* ================= MAP & ICONS ================= */
        #map { position: absolute; top: 110px; bottom: 35px; width: 100%; z-index: 1000; }
        .leaflet-top.leaflet-left { top: 20px; }
        #northArrow { position: absolute; top: 130px; right: 20px; width: 45px; height: 45px; background: white; border-radius: 50%; box-shadow: 0 3px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 4000; }

        /* ================= MENU & DASHBOARD ================= */
        #menuBtn { position: absolute; top: 130px; left: 15px; background: #5a3e2b; color: white; padding: 10px 14px; border-radius: 8px; cursor: pointer; z-index: 6000; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #dashboard { position: absolute; top: 110px; left: -360px; width: 320px; bottom: 35px; background: white; z-index: 6500; padding: 20px; overflow-y: auto; transition: 0.3s; box-shadow: 4px 0 10px rgba(0,0,0,0.2); }
        #dashboard.active { left: 0; }
        #dashboard h2 { margin: 0; color: #5a3e2b; }
        .dashboard-section { margin-bottom: 18px; }
        .dashboard-section label { font-weight: bold; display: block; margin-bottom: 5px; }
        .dashboard-section input, .dashboard-section button { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        .dashboard-section button { background: #8b5e3c; color: white; border: none; cursor: pointer; font-weight: bold; }
        .dashboard-info { background: #f3f3f3; padding: 10px; margin-top: 8px; font-size: 14px; border-radius: 4px; border: 1px solid #ddd; }

        /* ================= LAYERS PANEL ================= */
        #gmLayersBtn { position: absolute; bottom: 60px; right: 20px; width: 110px; height: 85px; background: white; border-radius: 16px; box-shadow: 0 6px 18px rgba(0,0,0,0.3); cursor: pointer; overflow: hidden; z-index: 6000; display: flex; flex-direction: column; justify-content: flex-end; }
        #gmLayersBtn img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        #gmLayersBtn span { position: relative; background: rgba(255,255,255,0.95); text-align: center; font-weight: bold; padding: 6px 0; font-size: 14px; }
        #gmPanel { position: absolute; bottom: 160px; right: 20px; width: 240px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 6500; padding: 18px; display: none; }
        .gmOption { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; }

        /* ================= FOOTER ================= */
        #footer { position: fixed; bottom: 0; width: 100%; background: #8b5e3c; color: white; text-align: center; padding: 8px 0; font-size: 14px; z-index: 7000; }
    </style>
</head>

<body>
    <div id="header">
        <video autoplay muted loop playsinline><source src="VIDEO 1.mp4" type="video/mp4"></video>
        <img src="PUO.png" alt="Logo">
        <h1>TAMAN SAUJANA PUTRA</h1>
    </div>

    <div id="map"></div>
    <div id="northArrow"><img src="north.png" width="30" alt="N"></div>
        
    <div id="menuBtn">☰ Menu Dashboard</div>
    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>DASHBOARD</h2>
            <button id="closeDashboard" style="background:red; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; width:auto;">✖</button>
        </div><hr>

        <div class="dashboard-section">
            <label>Jumlah Lot</label>
            <div id="totalLot" class="dashboard-info">-</div>
        </div>
        
        <div class="dashboard-section">
            <label>Carian Lot (Land Explorer)</label>
            <input type="text" id="searchLot" placeholder="Masukkan No Lot">
            <button id="findLot">Cari Lot</button>
            <button id="resetLot" style="background:#555;">Reset Peta</button>
        </div>

        <div class="dashboard-section">
            <label>Maklumat Lot Dipilih</label>
            <div id="lotInfo" class="dashboard-info">Sila klik mana-mana lot di peta.</div>
            <button id="generatePDF" style="background:#28a745; margin-top:10px;">Cetak PDF Lot</button>
        </div>
    </div>

    <div id="gmLayersBtn">
        <img src="MAPS.png" alt="Map">
        <span>Layers</span>
    </div>

    <div id="gmPanel">
        <h3 style="margin-top:0;">Jenis Peta</h3>
        <div class="gmOption"><input type="radio" name="basemap" id="satRadio" checked> Satellite</div>
        <div class="gmOption"><input type="radio" name="basemap" id="streetRadio"> Street</div><hr>
        
        <h3>Data Layer</h3>
        <div class="gmOption"><input type="checkbox" id="lotCheck" checked> Papar Lot Tanah</div>
        <div class="gmOption"><input type="checkbox" id="tandaCheck" checked> Tanda Sempadan</div>
    </div>

    <div id="footer">Hak Cipta Terpelihara 2026 @ umrzcyn</div>

    <script src="js/leaflet.js"></script>
    <script src="data/MERGE13_4.js"></script>
    <script src="data/TandaSempadanGabung_1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        // ================= 1. INTERAKSI BUTANG (KLIK MENU & LAYERS) =================
        document.getElementById("menuBtn").addEventListener("click", function() {
            document.getElementById("dashboard").classList.add("active");
        });
        document.getElementById("closeDashboard").addEventListener("click", function() {
            document.getElementById("dashboard").classList.remove("active");
        });
        
        document.getElementById("gmLayersBtn").addEventListener("click", function() {
            var panel = document.getElementById("gmPanel");
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        });

        // ================= 2. SETUP PETA (MAP) =================
        var map = L.map('map', { zoomControl: false, maxZoom: 22, minZoom: 5 }).fitBounds([[2.103090, 102.520846], [2.104445, 102.523314]]);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        var satellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22 }).addTo(map);
        var street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22 });

        document.getElementById("satRadio").onchange = function() { map.removeLayer(street); map.addLayer(satellite); };
        document.getElementById("streetRadio").onchange = function() { map.removeLayer(satellite); map.addLayer(street); };

        // ================= 3. GAYA & KLIK LOT =================
        var selectedLayer = null;

        function styleNormal() { return { color: '#ffffff', weight: 1.5, fillColor: '#8b5e3c', fillOpacity: 0.6 }; }
        function styleHighlight() { return { color: '#ff0000', weight: 3, fillColor: 'yellow', fillOpacity: 0.8 }; }

        // DIKEMASKINI: Guna json_MERGE13_4
        var layer_MERGE13_4 = new L.geoJson(json_MERGE13_4, {
            style: styleNormal,
            onEachFeature: function(feature, layer) {
                layer.on('click', function(e) {
                    
                    // Reset warna lama
                    if (selectedLayer) { selectedLayer.setStyle(styleNormal()); }
                    
                    // Tukar warna baru (highlight)
                    selectedLayer = layer;
                    layer.setStyle(styleHighlight());
                    layer.bringToFront();

                    // Baca Data QGIS
                    let noPA = feature.properties["tsp — _1"] || "-";
                    let noLot = feature.properties["NO_LOT"] || "-";
                    let luas = feature.properties["AREA"] ? parseFloat(feature.properties["AREA"]).toFixed(2) : "-";
                    let pemilik = feature.properties["tsp — pe"] || "-";

                    let infoLengkap = `<b>No PA:</b> ${noPA}<br><b>No Lot:</b> ${noLot}<br><b>Keluasan:</b> ${luas} m²<br><b>Pemilik:</b> ${pemilik}`;
                    
                    // Tunjuk Popup di Map
                    layer.bindPopup(`<div style="font-size:14px;">${infoLengkap}</div>`).openPopup();
                    
                    // Update di Dashboard
                    document.getElementById("lotInfo").innerHTML = infoLengkap;
                    
                    // Buka Dashboard automatik
                    document.getElementById("dashboard").classList.add("active");
                });
            }
        }).addTo(map);

        // Masukkan Point Sempadan
        var tandaLayer = new L.geoJson(json_TandaSempadanGabung_1, {
            pointToLayer: function(feature, latlng) {
                return L.circleMarker(latlng, { radius: 4, color: '#232323', fillColor: '#d5b43c', fillOpacity: 1 });
            }
        }).addTo(map);

        // Update Jumlah Lot di Menu
        document.getElementById("totalLot").innerHTML = layer_MERGE13_4.getLayers().length + " Lot Tanah";

        // ================= 4. FUNGSI CARIAN LOT =================
        document.getElementById("findLot").addEventListener("click", function() {
            let searchValue = document.getElementById("searchLot").value.trim().toLowerCase();
            let dijumpai = false;

            layer_MERGE13_4.eachLayer(function(layer) {
                if ((layer.feature.properties["NO_LOT"] || "").toString().toLowerCase() === searchValue) {
                    map.fitBounds(layer.getBounds(), { maxZoom: 20 });
                    layer.fire('click'); // Jadikan ia auto-klik
                    dijumpai = true;
                }
            });
            if(!dijumpai) { alert("Lot " + searchValue + " tidak dijumpai."); }
        });

        document.getElementById("resetLot").addEventListener("click", function() {
            document.getElementById("searchLot").value = "";
            document.getElementById("lotInfo").innerHTML = "Sila klik mana-mana lot di peta.";
            if (selectedLayer) { selectedLayer.setStyle(styleNormal()); selectedLayer = null; }
            map.closePopup();
            map.fitBounds([[2.103090, 102.520846], [2.104445, 102.523314]]);
        });

        // ================= 5. ON/OFF LAYER DI PANEL =================
        document.getElementById("lotCheck").onchange = function() {
            this.checked ? map.addLayer(layer_MERGE13_4) : map.removeLayer(layer_MERGE13_4);
        };
        document.getElementById("tandaCheck").onchange = function() {
            this.checked ? map.addLayer(tandaLayer) : map.removeLayer(tandaLayer);
        };

        // ================= 6. CETAK PDF =================
        document.getElementById("generatePDF").addEventListener("click", function() {
            if(!selectedLayer){
                alert("Sila klik pada mana-mana lot tanah di peta terlebih dahulu.");
                return;
            }
            alert("Fungsi Generate PDF diaktifkan untuk Lot: " + selectedLayer.feature.properties["NO_LOT"]);
        });

    </script>
</body>
</html>
